name: release

# 触发：推 v* tag 即发布。bun build --compile 支持跨平台交叉编译，
# 5 个三元组全部在同一台 ubuntu runner 上出包，保证工具链一致、provenance 统一。
on:
  push:
    tags:
      - "v*"

# 顶层默认最小权限；各 job 按需覆盖。
permissions:
  contents: read

jobs:
  # ── 交叉编译 + 打包 + 构建溯源 ──────────────────────────────
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    permissions:
      contents: read       # checkout
      id-token: write       # attest-build-provenance 走 sigstore oidc 签名
      attestations: write   # 写 attestation 到本仓库
    strategy:
      fail-fast: false
      matrix:
        # target = bun 交叉编译三元组；asset = install.sh/ps1 请求的简洁平台名
        # （去掉 bun- 前缀、不含 version）。资产名统一为 party-<asset>.tar.gz。
        include:
          - target: bun-linux-x64
            asset: linux-x64
            ext: ""
          - target: bun-linux-arm64
            asset: linux-arm64
            ext: ""
          - target: bun-darwin-x64
            asset: darwin-x64
            ext: ""
          - target: bun-darwin-arm64
            asset: darwin-arm64
            ext: ""
          - target: bun-windows-x64
            asset: windows-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # 用根 lockfile 装全 workspace，保证 workspace:* 依赖（@agentparty/shared）可解析
      - name: install deps
        run: bun install --frozen-lockfile

      - name: derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: compile binary
        working-directory: cli
        run: |
          bun build --compile --target=${{ matrix.target }} \
            ./src/index.ts --outfile "party${{ matrix.ext }}"

      # 打 tar.gz + sha256（资产名与 install.sh/ps1 请求一致：party-<asset>.tar.gz）
      # sha256 文件里存 tar.gz 的名字，install 侧直接取第一段 hash 比对。
      - name: package
        id: pkg
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          pkg="party-${ASSET}.tar.gz"
          tar -czf "$pkg" -C cli "party${{ matrix.ext }}"
          sha256sum "$pkg" > "${pkg}.sha256"
          echo "pkg=$pkg" >> "$GITHUB_OUTPUT"

      # cosign 离线验签链路：用 secrets 里的私钥对每个 tarball 签名，产出 <pkg>.sig。
      # install.sh/ps1 内嵌 pinned 公钥离线 verify-blob。未配私钥时跳过（install 侧回退 sha256）。
      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign blob
        id: sign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          PKG: ${{ steps.pkg.outputs.pkg }}
        run: |
          if [ -z "${COSIGN_PRIVATE_KEY:-}" ]; then
            echo "::warning::COSIGN_PRIVATE_KEY 未配置 — 跳过签名（install 侧仅 sha256）"
            exit 0
          fi
          cosign sign-blob --yes --key env://COSIGN_PRIVATE_KEY \
            "$PKG" --output-signature "${PKG}.sig"

      # 保留 attest-build-provenance 作为额外溯源层（gh attestation verify 可增强验证）
      - name: attest provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.pkg.outputs.pkg }}

      # party-*.tar.gz* 一把捞 tar.gz / .sha256 / .sig（.sig 未签名时缺省，glob 不报错）
      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: party-*.tar.gz*
          if-no-files-found: error
          retention-days: 7

  # ── 汇总所有产物挂到该 tag 的 Release ──────────────────────
  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 建/改 Release、上传 assets
    steps:
      - name: collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # .sig 是可选层（未配 COSIGN_PRIVATE_KEY 时不存在），故 fail_on_unmatched_files:false；
      # tar.gz / .sha256 的存在性已由 build job 的 if-no-files-found:error 兜底保证。
      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.tar.gz.sig
