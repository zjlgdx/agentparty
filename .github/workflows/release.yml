name: release

# 触发：PR / main push 跑完整门禁；推 v* tag 先跑同一门禁，再发布。
# bun build --compile 支持跨平台交叉编译，5 个三元组全部在同一台 ubuntu runner
# 上出包，保证工具链一致、provenance 统一。
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

# 顶层默认最小权限；各 job 按需覆盖。
permissions:
  contents: read

jobs:
  # ── #9 pre-merge / release gate：必须覆盖测试文件 tsc ─────────────
  check:
    name: full check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: install deps
        run: bun install --frozen-lockfile

      - name: verify release version contract
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CLI_VERSION=$(bun -e 'process.stdout.write(require("./cli/package.json").version)')
          DESKTOP_VERSION=$(bun -e 'process.stdout.write(require("./desktop/package.json").version)')
          if ! { [ "$TAG_VERSION" = "$CLI_VERSION" ] && [ "$TAG_VERSION" = "$DESKTOP_VERSION" ]; }; then
            echo "::error::release version mismatch: tag=$TAG_VERSION cli=$CLI_VERSION desktop=$DESKTOP_VERSION"
            exit 1
          fi

      - name: run full workspace check
        run: bun run check

  # ── 交叉编译 + 打包 + 构建溯源 ──────────────────────────────
  build:
    name: build ${{ matrix.target }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      id-token: write # attest-build-provenance 走 sigstore oidc 签名
      attestations: write # 写 attestation 到本仓库
    strategy:
      fail-fast: false
      matrix:
        # target = bun 交叉编译三元组；asset = install.sh/ps1 请求的简洁平台名
        # （去掉 bun- 前缀、不含 version）。资产名统一为 party-<asset>.tar.gz。
        include:
          - target: bun-linux-x64
            asset: linux-x64
            ext: ""
          - target: bun-linux-arm64
            asset: linux-arm64
            ext: ""
          - target: bun-darwin-x64
            asset: darwin-x64
            ext: ""
          - target: bun-darwin-arm64
            asset: darwin-arm64
            ext: ""
          - target: bun-windows-x64
            asset: windows-x64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      # 用根 lockfile 装全 workspace，保证 workspace:* 依赖（@agentparty/shared）可解析
      - name: install deps
        run: bun install --frozen-lockfile

      - name: derive version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: compile binary
        working-directory: cli
        run: |
          bun build --compile --target=${{ matrix.target }} \
            ./src/index.ts --outfile "party${{ matrix.ext }}"

      # #9 release-asset smoke：跑「真二进制」验 json 契约 + stdout/stderr/exit，
      # 堵 v0.2.7 那种「源码测试过了但打包入口/旧 binary 行为脱节」。只在 runner 原生的 linux-x64 跑。
      - name: json contract smoke
        if: matrix.target == 'bun-linux-x64'
        working-directory: cli
        env:
          AGENTPARTY_HOME: ${{ runner.temp }}/ap-smoke # 干净隔离，无残留 config/account
        run: |
          set -euo pipefail
          echo "version=$(./party --version)"
          # whoami --json（未登录）：schema/type/logged_in 且 stdout-only（stderr 须空）
          out="$(./party whoami --json 2>/tmp/w.err)"
          echo "$out" | jq -e '.schema=="agentparty.v1" and .type=="whoami" and .logged_in==false' >/dev/null
          if [ -s /tmp/w.err ]; then echo "FAIL: whoami --json 不该往 stderr 写"; cat /tmp/w.err; exit 1; fi
          # per-command --help：exit 0 + usage 到 stdout
          ./party history --help | grep -q usage
          # 错误路径 history --json（无 config）：exit≠0 + stdout 空 + stderr 有错（transport 契约）
          if ./party history --json >/tmp/hj.out 2>/tmp/hj.err; then echo "FAIL: 应非零退出"; exit 1; fi
          if [ -s /tmp/hj.out ]; then echo "FAIL: 错误路径 stdout 应为空"; cat /tmp/hj.out; exit 1; fi
          grep -q "no config" /tmp/hj.err
          echo "json contract smoke ✅"

      # 打 tar.gz + sha256（资产名与 install.sh/ps1 请求一致：party-<asset>.tar.gz）
      # sha256 文件里存 tar.gz 的名字，install 侧直接取第一段 hash 比对。
      - name: package
        id: pkg
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          pkg="party-${ASSET}.tar.gz"
          tar -czf "$pkg" -C cli "party${{ matrix.ext }}"
          sha256sum "$pkg" > "${pkg}.sha256"
          echo "pkg=$pkg" >> "$GITHUB_OUTPUT"

      # cosign 离线验签链路：用 secrets 里的私钥对每个 tarball 签名，产出 <pkg>.sig。
      # install.sh/ps1 内嵌 pinned 公钥离线 verify-blob。未配私钥时跳过（install 侧回退 sha256）。
      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: sign blob
        id: sign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          PKG: ${{ steps.pkg.outputs.pkg }}
        run: |
          if [ -z "${COSIGN_PRIVATE_KEY:-}" ]; then
            echo "::warning::COSIGN_PRIVATE_KEY 未配置 — 跳过签名（install 侧仅 sha256）"
            exit 0
          fi
          cosign sign-blob --yes --key env://COSIGN_PRIVATE_KEY \
            "$PKG" --output-signature "${PKG}.sig"

      # 保留 attest-build-provenance 作为额外溯源层（gh attestation verify 可增强验证）
      - name: attest provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.pkg.outputs.pkg }}

      # party-*.tar.gz* 一把捞 tar.gz / .sha256 / .sig（.sig 未签名时缺省，glob 不报错）
      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: party-*.tar.gz*
          if-no-files-found: error
          retention-days: 7

  desktop:
    name: build desktop ${{ matrix.asset }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            asset: darwin-x64
          - runner: macos-14
            asset: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: install deps
        run: bun install --frozen-lockfile

      - name: require updater signing key
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for desktop updater artifacts"
            exit 1
          fi

      - name: build prod desktop app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run desktop:build:prod

      - name: package desktop artifacts
        env:
          ASSET: ${{ matrix.asset }}
        run: |
          set -euo pipefail
          dmg="$(find desktop/src-tauri/target/release/bundle/dmg -name '*.dmg' -type f 2>/dev/null | head -n 1 || true)"
          updater="$(find desktop/src-tauri/target/release/bundle/macos -name '*.app.tar.gz' -type f 2>/dev/null | head -n 1 || true)"
          if [ ! -s "$dmg" ] || [ ! -s "$updater" ] || [ ! -s "${updater}.sig" ]; then
            echo "Missing DMG, updater bundle, or updater signature"
            find desktop/src-tauri/target/release/bundle -maxdepth 3 -type f || true
            exit 1
          fi
          dmg_out="agentparty-desktop-${ASSET}.dmg"
          updater_out="agentparty-desktop-${ASSET}.app.tar.gz"
          cp "$dmg" "$dmg_out"
          cp "$updater" "$updater_out"
          cp "${updater}.sig" "${updater_out}.sig"
          shasum -a 256 "$dmg_out" > "${dmg_out}.sha256"

      - name: upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.asset }}
          path: agentparty-desktop-*
          if-no-files-found: error
          retention-days: 7

  # ── 汇总所有产物挂到该 tag 的 Release ──────────────────────
  release:
    name: publish release
    needs:
      - build
      - desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write # 建/改 Release、上传 assets
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: generate desktop updater manifest
        run: |
          bun scripts/desktop-update-manifest.ts \
            --version "${GITHUB_REF_NAME#v}" \
            --tag "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist \
            --output dist/latest.json \
            --notes "AgentParty $GITHUB_REF_NAME desktop update"

      - name: classify release channel
        id: release-channel
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_WITHOUT_BUILD="${VERSION%%+*}"
          if [[ "$VERSION_WITHOUT_BUILD" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          fi

      # CLI cosign .sig 是可选层（未配 COSIGN_PRIVATE_KEY 时不存在），故保留
      # fail_on_unmatched_files:false；Tauri updater .sig 已由 desktop job 强制校验。
      - name: upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ steps.release-channel.outputs.prerelease }}
          make_latest: ${{ steps.release-channel.outputs.make_latest }}
          fail_on_unmatched_files: false
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.tar.gz.sig
            dist/*.dmg
            dist/*.dmg.sha256
            dist/latest.json
